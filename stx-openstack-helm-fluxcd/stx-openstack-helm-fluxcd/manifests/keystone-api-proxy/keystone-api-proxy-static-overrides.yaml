---
release_group: osh-openstack-keystone-api-proxy
labels:
  isApplication: false
endpoints:
  identity:
    force_public_endpoint: true
images:
  tags:
    keystone_api_proxy: docker.io/starlingx/stx-keystone-api-proxy:@IMAGE_PREFIX@-@OS@-@OS_CODENAME@-@OS_ARCH@-@BUILD_STREAM@-@IMAGE_SUFFIX@
    ks_endpoints: docker.io/starlingx/stx-heat:@IMAGE_PREFIX@-@OS@-@OS_CODENAME@-@OS_ARCH@-@BUILD_STREAM@-@IMAGE_SUFFIX@
    pre_apply_cleanup: docker.io/starlingx/stx-vault-manager:@IMAGE_PREFIX@-@OS@-@OS_CODENAME@-@OS_ARCH@-@BUILD_STREAM@-@IMAGE_SUFFIX@
    dep_check: quay.io/airshipit/kubernetes-entrypoint:9ff5d2e488ad18187bccc48e9595f197d27110c4-ubuntu_jammy
network:
  keystone_api_proxy:
    ingress:
      classes:
        namespace: "nginx-openstack"
        cluster: "nginx"
conf:
  keystone_api_proxy:
    identity:
      bind_host: "::"
      remote_host: keystone.openstack.svc.cluster.local
      remote_port: 80
pod:
  labels:
    include_app_kubernetes_io: false
...
